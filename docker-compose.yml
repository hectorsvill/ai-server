services:
  # Ollama runs natively on the host (systemd service) for direct AMD ROCm GPU access.
  # Running natively avoids ROCm driver version conflicts, GPU device passthrough
  # complexity, and container networking overhead. Open WebUI connects to the host
  # ollama service via host.docker.internal:11434.

  # Open WebUI service as a frontend for Ollama
  open-webui:
    image: 'ghcr.io/open-webui/open-webui:main'
    container_name: open-webui
    ports:
      - "${OPEN_WEBUI_PORT}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-network
    restart: always

  # Glance service for monitoring/dashboard
  glance:
    container_name: glance
    image: glanceapp/glance
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./assets:/app/assets
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${GLANCE_PORT}:8080"
    env_file: .env
    networks:
      - ai-network

  # Docmost application service
  docmost:
    image: docmost/docmost:latest
    container_name: docmost
    depends_on:
      - docmost_db
      - redis
    environment:
      APP_URL: ${APP_URL}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    ports:
      - "${DOCMOST_PORT}:3000"
    restart: unless-stopped
    volumes:
      - docmost_data:/app/data/storage
    networks:
      - ai-network

  # PostgreSQL database service for Docmost (renamed from 'db' to 'docmost_db')
  docmost_db:
    image: postgres:16-alpine
    container_name: docmost-postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-network

  # Redis service for Docmost
  redis:
    image: redis:7.2-alpine
    container_name: docmost-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data 
    networks:
      - ai-network

# Define the custom bridge network
networks:
  ai-network:
    driver: bridge

# Define named volumes for persistent data
volumes:
  open_webui_data:
  docmost_data:
  postgres_data:
  redis_data: