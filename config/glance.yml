server:
  host: 0.0.0.0
  port: 8080
  assets-path: /app/assets

theme:
  background-color: 225 14 9
  primary-color: 196 100 55
  positive-color: 142 71 50
  negative-color: 0 80 58
  contrast-multiplier: 1.25
  custom-css-file: /app/assets/custom.css

pages:
  - name: Home
    columns:
      # ── Left: Clock + System Resources ───────────────────────────────────
      - size: small
        widgets:
          - type: clock
            hour-format: 24h

          - type: server-stats
            title: System Resources
            disk-mount-points:
              - /host

          - type: extension
            title: RX 7900 GRE
            url: http://host.docker.internal:40404/
            cache: 5s
            allow-potentially-dangerous-html: true

      # ── Center: Service Health & Navigation ──────────────────────────────
      - size: small
        widgets:
          - type: monitor
            title: Services
            cache: 30s
            sites:
              - title: Open WebUI
                url: https://webui.vailab.us
                icon: si:openai
                same-tab: true

              - title: Ollama API
                url: http://host.docker.internal:11434
                same-tab: true

              - title: Docmost
                url: https://docs.vailab.us
                icon: si:gitbook
                same-tab: true

              - title: n8n
                url: https://n8n.vailab.us
                icon: si:n8n
                same-tab: true

              - title: Glance Dashboard
                url: https://dash.vailab.us
                icon: si:grafana
                same-tab: true

          - type: docker-containers
            title: Docker Containers
            hide-by-default: false

      # ── Right: Search + News Feed ─────────────────────────────────────────
      - size: full
        widgets:
          - type: search
            placeholder: "Search the web..."
            autofocus: true
            search-engine: https://www.google.com/search?q={QUERY}
            bangs:
              - title: GitHub
                shortcut: "!gh"
                url: https://github.com/search?q={QUERY}
              - title: Docker Hub
                shortcut: "!dh"
                url: https://hub.docker.com/search?q={QUERY}
              - title: Hacker News
                shortcut: "!hn"
                url: https://hn.algolia.com/?q={QUERY}

          - type: rss
            title: AI & Tech News
            limit: 12
            collapse-after: 5
            feeds:
              - url: https://feeds.feedburner.com/venturebeat/SZYF
                title: VentureBeat AI
              - url: https://www.artificialintelligence-news.com/feed/
                title: AI News
              - url: https://hnrss.org/frontpage
                title: Hacker News
              - url: https://feeds.feedburner.com/oreilly/radar
                title: O'Reilly Radar
