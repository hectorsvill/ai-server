name: Guardian CI

on:
  push:
    paths:
      - "guardian/**"
      - ".github/workflows/guardian-ci.yml"
  pull_request:
    paths:
      - "guardian/**"
      - ".github/workflows/guardian-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            guardian/requirements.txt
            guardian/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r guardian/requirements.txt
          pip install -r guardian/requirements-dev.txt

      - name: Run tests
        run: pytest guardian/tests/ -q --tb=short
        env:
          PYTHONPATH: .
